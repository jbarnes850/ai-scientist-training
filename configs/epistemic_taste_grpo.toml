model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 80

batch_size = 128
rollouts_per_example = 8
learning_rate = 1e-6
lora_alpha = 16

[sampling]
max_tokens = 1024
temperature = 0.3

[[env]]
id = "jbarnes850/epistemic-taste"
args = { split = "train" }

[eval]
interval = 20
num_examples = 64
rollouts_per_example = 4
eval_base_model = true

[[eval.env]]
id = "jbarnes850/epistemic-taste"
args = { split = "dev", max_examples = 200 }

[infrastructure]
compute_size = "M"
